# Codex CLI project-scoped MCP server configuration.
# Codex only loads this file for trusted projects - see docs/cross-tool-setup.md.
# Required env vars: ADO_ORG, SQL_HOST, SQL_DATABASE, SQL_USER, SQL_PASSWORD,
# KUSTO_CLUSTER_URI, KUSTO_DATABASE (export these in your shell before running codex)

[mcp_servers.ado]
command = "npx"
args = ["-y", "@azure-devops/mcp", "$ADO_ORG", "-d", "core", "work", "work-items", "wiki"]

[mcp_servers.sql]
command = "npx"
args = ["-y", "@bilims/mcp-sqlserver"]
env = { SQLSERVER_HOST = "$SQL_HOST", SQLSERVER_DATABASE = "$SQL_DATABASE", SQLSERVER_USER = "$SQL_USER", SQLSERVER_PASSWORD = "$SQL_PASSWORD", SQLSERVER_ENCRYPT = "true" }

[mcp_servers.kusto]
command = "npx"
args = ["-y", "kusto-mcp@latest"]
env = { KUSTO_CLUSTER_URI = "$KUSTO_CLUSTER_URI", KUSTO_DATABASE = "$KUSTO_DATABASE" }

# Slack's official remote MCP server - OAuth, no local process or token needed.
# NOTE: Codex's remote/Streamable-HTTP MCP config syntax moves faster than its
# local stdio syntax and wasn't independently verified here (unlike the three
# servers above) - confirm the key name for the URL against current Codex docs
# before relying on this. If Codex requires OAuth setup this config doesn't
# capture, `codex mcp list` after loading will tell you.
[mcp_servers.slack]
url = "https://mcp.slack.com/mcp"
